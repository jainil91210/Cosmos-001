<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Gemini Bridge Setup</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #202024;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h1 { color: #04d361; margin-top: 0; font-size: 1.8rem; }
        .config-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.9rem;
            color: #a8a8b3;
            margin-bottom: 0.4rem;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            background-color: #121214;
            border: 2px solid #29292e;
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #04d361;
        }
        .status-box {
            background: #121214;
            padding: 1rem;
            border-radius: 6px;
            font-family: monospace;
            margin-top: 1.5rem;
            border-left: 4px solid #04d361;
            text-align: left;
            word-break: break-all;
        }
        .loading-pulse {
            color: #ffbb00;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gemini AI Gateway</h1>
    <p>Configure credentials directly from the dashboard below.</p>
    
    <div class="config-group">
        <label for="espIp">ESP32 IP Address:</label>
        <input type="text" id="espIp" value="192.168.1.13" placeholder="e.g. 192.168.43.45">
    </div>

    <div class="config-group">
        <label for="apiKey">Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="Paste AI Studio API Key here...">
    </div>
    
    <div class="status-box" id="statusLog">System Status: Waiting for configurations...</div>
</div>

<script>
// Essential loop pipeline state lock
let isProcessingNetworkRequest = false;

function updateLog(message, isHighlight = false) {
    const logEl = document.getElementById("statusLog");
    if (isHighlight) {
        logEl.innerHTML = `<span class="loading-pulse">${message}</span>`;
    } else {
        logEl.innerText = message;
    }
    console.log(message);
}

async function checkAndProcessBridgePipeline() {
    // Read fresh values from browser inputs in real-time
    const esp32IP = document.getElementById("espIp").value.trim();
    const geminiKey = document.getElementById("apiKey").value.trim();

    // Prevent network activity if credentials aren't filled out
    if (!esp32IP || !geminiKey) {
        updateLog("Status: Setup incomplete. Please enter both IP and API Key.");
        return;
    }

    // Safety lock against simultaneous queries
    if (isProcessingNetworkRequest) return;
    isProcessingNetworkRequest = true;

    const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${geminiKey}`;

    try {
        updateLog("Polling ESP32 for active prompts...");
        
        const response = await fetch(`http://${esp32IP}/get_prompt`);
        
        if (response.status === 204) {
            updateLog("Status: Listening... (No prompt sent yet)");
            isProcessingNetworkRequest = false; 
            return;
        }

        if (response.status === 200) {
            const textPrompt = await response.text();
            if (!textPrompt || textPrompt.trim() === "") {
                isProcessingNetworkRequest = false;
                return;
            }

            updateLog(`Prompt Found: "${textPrompt}". Dispatching to Gemini cloud...`, true);

            // Forward prompt directly to Gemini servers
            const geminiResponse = await fetch(geminiUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: textPrompt + " Keep your response short, max 2-3 lines." }] }]
                })
            });

            const geminiData = await geminiResponse.json();

            if (geminiData.error) {
                if (geminiData.error.status === "RESOURCE_EXHAUSTED") {
                    updateLog("Error: Quota hit! Rate controller limiting next cycles.", true);
                } else {
                    updateLog(`Gemini API Error: ${geminiData.error.message}`);
                }
                isProcessingNetworkRequest = false;
                return;
            }

            const aiReply = geminiData.candidates[0].content.parts[0].text;
            updateLog(`Gemini Replied. Syncing text back to ESP32 screen...`, true);

            // Transmit generated token back to local screen server
            await fetch(`http://${esp32IP}/send`, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: aiReply
            });

            updateLog("Transaction Complete! Returning to normal keyboard tracking mode.");
        }
    } catch (err) {
        updateLog(`Network connection error: ${err.message}. Check IP or connection.`);
    }

    // Release layout process lock safely
    isProcessingNetworkRequest = false;
}

// 3-second polling gate keeps transaction metrics clear of rate limits
setInterval(checkAndProcessBridgePipeline, 3000);
</script>

</body>
</html>
